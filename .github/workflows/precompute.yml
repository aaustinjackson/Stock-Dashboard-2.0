name: Precompute Forecasts

on:
  schedule:
    - cron: '0 2 * * 0'  # e.g., every Sunday at 2 AM
  workflow_dispatch:

jobs:
  precompute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run precompute forecasts
        run: python data/precompute_forecasts.py
